<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#002D62"/>
      <stop offset="100%" style="stop-color:#001a3a"/>
    </linearGradient>
  </defs>
  
  <!-- Fondo -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>
  
  <!-- Cruz de la bandera -->
  <rect x="220" y="80" width="72" height="352" fill="#ffffff" opacity="0.2"/>
  <rect x="80" y="220" width="352" height="72" fill="#ffffff" opacity="0.2"/>
  
  <!-- Texto RD -->
  <text x="256" y="200" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="#ffffff" text-anchor="middle">RD</text>
  
  <!-- Quiz -->
  <text x="256" y="300" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#CE1126" text-anchor="middle">Quiz</text>
  
  <!-- Signos de interrogación decorativos -->
  <text x="110" y="400" font-family="Arial, sans-serif" font-size="60" fill="#ffffff" opacity="0.4">?</text>
  <text x="380" y="150" font-family="Arial, sans-serif" font-size="50" fill="#ffffff" opacity="0.3">?</text>
  
  <!-- Bandera pequeña -->
  <g transform="translate(180, 350)">
    <rect x="0" y="0" width="40" height="25" fill="#002D62"/>
    <rect x="40" y="0" width="40" height="25" fill="#CE1126"/>
    <rect x="0" y="25" width="40" height="25" fill="#CE1126"/>
    <rect x="40" y="25" width="40" height="25" fill="#002D62"/>
    <rect x="35" y="0" width="10" height="50" fill="#ffffff"/>
    <rect x="0" y="20" width="80" height="10" fill="#ffffff"/>
  </g>
  
  <!-- Emoji bandera -->
  <text x="300" y="400" font-size="50">🇩🇴</text>
</svg>
