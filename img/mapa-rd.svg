<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .province {
        fill: #5A5A5A;
        stroke: #FFFFFF;
        stroke-width: 1;
        cursor: pointer;
        transition: fill 0.3s ease;
      }
      .province:hover {
        fill: #707070;
      }
      .province.highlighted {
        fill: #CE1126;
        stroke: #FFFFFF;
        stroke-width: 1.5;
        animation: pulse 1.5s ease-in-out infinite;
      }
      .province.correct {
        fill: #22C55E;
        stroke: #FFFFFF;
        stroke-width: 1.5;
      }
      .province.wrong {
        fill: #EF4444;
        stroke: #FFFFFF;
        stroke-width: 1.5;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.75; }
      }
      .water {
        fill: #FFFFFF;
      }
    </style>
  </defs>
  
  <!-- Fondo blanco -->
  <rect class="water" width="800" height="500"/>
  
